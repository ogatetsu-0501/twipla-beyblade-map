name: Scrape and deploy GitHub Pages

on:
  workflow_dispatch:
  schedule:
    # 毎週月曜日 03:00（日本時間）に相当します。
    - cron: "0 18 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # リポジトリのソースコードを取得します。
      - name: Checkout
        uses: actions/checkout@v4

      # Node.jsと公開npmレジストリを設定します。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # イベント詳細と住所検索のキャッシュを次回実行へ引き継ぎます。
      - name: Restore scraper cache
        id: scraper-cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: scraper-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            scraper-${{ runner.os }}-

      # npmのバージョンと接続先を固定します。
      - name: Configure npm
        run: |
          npm install --global npm@10.9.2 --registry=https://registry.npmjs.org/
          npm config set registry https://registry.npmjs.org/
          node --version
          npm --version
          npm config get registry

      # OpenAI内部環境用URLがlockファイルへ残っていないことを確認します。
      - name: Validate package lock registry
        shell: bash
        run: |
          set -euo pipefail

          if grep -Eqi \
            'applied-caas|internal\.api\.openai\.org|openai\.org/artifactory/api/npm' \
            package-lock.json; then
            echo "::error::package-lock.json に外部からアクセスできない内部レジストリURLが残っています。"
            echo "tools/fix-package-lock.ps1 をローカルで実行し、package-lock.jsonをcommitしてください。"
            grep -Ein \
              'applied-caas|internal\.api\.openai\.org|openai\.org/artifactory/api/npm' \
              package-lock.json | head -n 20
            exit 1
          fi

          echo "package-lock.json の取得先URLは正常です。"

      # lockファイルどおりに依存関係をインストールします。
      - name: Install dependencies
        run: |
          npm ci \
            --no-audit \
            --no-fund \
            --registry=https://registry.npmjs.org/ \
            --fetch-retries=5 \
            --fetch-retry-mintimeout=10000 \
            --fetch-retry-maxtimeout=60000 \
            --fetch-timeout=300000

      # TwiPlaを低速で巡回して、公開用データファイルを生成します。
      - name: Scrape events
        env:
          SCRAPER_USER_AGENT: beyblade-event-map/1.0 (+${{ github.server_url }}/${{ github.repository }})
          REQUEST_DELAY_MIN_MS: "8000"
          REQUEST_DELAY_MAX_MS: "15000"
          SEARCH_LIMIT: "100"
        run: npm run scrape

      # 型、テスト、静的サイトのビルドを確認します。
      - name: Verify and build
        run: npm run check

      # GitHub Pagesの設定を準備します。
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # distだけをPages用artifactとしてアップロードします。
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      # buildジョブで作成したartifactをGitHub Pagesへ公開します。
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
